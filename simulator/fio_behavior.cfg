[global]
ioengine=libaio
direct=1
group_reporting
time_based

# --- 1. 惡意檔案複製 (模擬資料外洩/擴散) ---
[malicious_copy]
# 模擬大檔案循序讀取並外傳
rw=read
bs=1M
iodepth=4
numjobs=1
size=4G
description="Simulating data exfiltration (Sequential Read)"

# --- 2. 勒索軟體 (高壓加密行為) ---
[ransomware]
# 勒索軟體通常是：讀取 -> 加密 -> 覆蓋寫入
rw=randrw
rwmixread=50
bs=128k
iodepth=32
numjobs=4
# fsync=1 會強迫資料落盤，極大增加 IO 壓力，模擬真實加密損耗
fsync=1
description="High-intensity encryption (Random RW + Sync)"

# --- 3. 日常辦公 (更像人的隨機行為) ---
[daily_office]
rw=randrw
rwmixread=75
# 真實辦公：80% 小碎片(4k), 20% 中型文件(64k)
bssplit=4k/80:64k/20
iodepth=1
numjobs=1
# 模擬人類停頓：每做一個 IO 停 2秒，並有 +/- 50% 的隨機波動
thinktime=2s
thinktime_blocks=1
thinktime_spin=1000
size=1G
description="Human-like office work (Intermittent IO)"

# --- 4. 系統閒置 (低頻背景日誌) ---
[idle]
rw=randwrite
bs=4k
# 限制每秒只有 2 到 5 個 IOPS，模擬背景 log 寫入
rate_iops=5
numjobs=1
size=512M
description="Idle background logging (Very low IOPS)"

# --- 5. 軟體更新 (高密度寫入) ---
[software_update]
rw=write
# 更新包含解壓縮(大)與寫入(小)
bsrange=4k-128k
iodepth=16
numjobs=1
size=2G
description="Software install (Steady Burst Write)"